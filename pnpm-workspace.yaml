packages:
  - 'packages/*'
  - 'crates/rslint-native'
  - 'tests/bench-cli'
  - 'npm/rslint/*'
  - 'npm/tsgo/*'
  - 'website'

catalogs:
  tools:
    ajv: 6.15.0
    husky: ^9.1.7
    lint-staged: ^16.4.0
    prettier: 3.9.4
    zx: 8.8.5
  types:
    typescript: 5.9.3
    '@types/node': 25.9.4
    '@types/react': 19.2.14
    '@typescript/native-preview': 7.0.0-dev.20260427.1
  lint:
    eslint: 10.7.0
    '@eslint-community/eslint-plugin-eslint-comments': ^4.7.2
    '@eslint/plugin-kit': 0.7.2
    '@stylistic/eslint-plugin': 5.10.0
    '@typescript-eslint/parser': 8.59.0
    '@typescript-eslint/scope-manager': 8.59.4
    '@typescript-eslint/visitor-keys': 8.59.4
    eslint-plugin-cypress: ^6.4.1
    eslint-plugin-es-x: ^9.7.0
    eslint-plugin-playwright: ^2.10.4
    eslint-plugin-promise: 7.3.0
    eslint-plugin-security: ^4.0.1
    eslint-plugin-simple-import-sort: ^13.0.0
    eslint-plugin-sonarjs: 4.0.3
    eslint-plugin-unicorn: 64.0.0
    eslint-scope: 9.1.2
    eslint-visitor-keys: 5.0.1
    espree: 11.2.0
    esquery: 1.7.0
    globals: 17.7.0
  test:
    '@rstest/core': 0.11.3
    '@codspeed/tinybench-plugin': 5.2.0
    tinybench: 6.0.0
  vscode:
    '@types/mocha': 10.0.9
    '@types/vscode': ^1.125.0
    '@vscode/test-cli': 0.0.11
    '@vscode/test-electron': 2.5.2
    '@vscode/vsce': 3.9.1
    mocha: 10.8.2
    ovsx: ^0.10.5
    vscode-languageclient: ^9.0.1
    vscode-languageserver: ^9.0.1
    vscode-languageserver-textdocument: ^1.0.12
  build:
    esbuild: 0.28.0
    fast-glob: 3.3.3
    rimraf: 6.1.2
    '@napi-rs/cli': 3.7.0
    '@rslib/core': 0.23.0
    '@microsoft/api-extractor': 7.58.7
    picomatch: 4.0.4
    '@types/picomatch': 4.0.2
    tinyglobby: 0.2.15
    jiti: ^2.0.0
  wasm:
    '@wasmer/wasmfs': 0.12.0
    buffer: ^6.0.3
    cross-env: ^10.1.0
    esbuild-plugin-polyfill-node: 0.3.0
    memfs: ^4.64.0
    prebundle: 1.6.0
  website:
    '@radix-ui/react-label': ^2.1.7
    '@radix-ui/react-select': ^2.3.1
    '@radix-ui/react-slot': ^1.3.0
    '@radix-ui/react-toggle': ^1.1.10
    '@radix-ui/react-toggle-group': ^1.1.11
    class-variance-authority: ^0.7.1
    clsx: ^2.1.1
    dagre: ^0.8.5
    input-otp: ^1.4.2
    lucide-react: ^0.577.0
    swr: ^2.4.1
    tailwind-merge: ^3.6.0
    tw-animate-css: ^1.4.0
    '@rsbuild/plugin-node-polyfill': ^1.4.6
    '@rsbuild/plugin-sass': ^1.5.0
    '@rspress/core': ^2.0.15
    '@rspress/plugin-sitemap': ^2.0.15
    '@rstack-dev/doc-ui': 1.14.7
    '@tailwindcss/postcss': ^4.3.0
    '@types/dagre': ^0.7.53
    '@types/react-dom': ^19.2.3
    monaco-editor: 0.55.1
    react: ^19.2.6
    react-dom: ^19.2.6
    rsbuild-plugin-google-analytics: ^1.0.4
    rsbuild-plugin-open-graph: ^1.1.0
    rspress-plugin-font-open-sans: ^1.0.3
    tailwindcss: ^4.3.0

allowBuilds:
  '@tailwindcss/oxide': false
  '@vscode/vsce-sign': false
  core-js: false
  esbuild: true
  keytar: false

# Reduce the risk of installing compromised packages
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@rspack/*'
  - '@rsbuild/*'
  - '@rslib/*'
  - '@rspress/*'
  - '@rstest/*'
  - '@rsdoctor/*'
  - '@rslint/*'
  - '@rstackjs/*'
  - '@rstack-dev/*'

# Prevent un-reviewed build scripts
strictDepBuilds: true
