name: 📦 Release crates

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to release'
        required: true
        default: 'main'
      dry_run:
        type: boolean
        description: 'Run the workflow in dry-run mode'
        required: false
        default: false

permissions:
  contents: read

jobs:
  publish-crates:
    name: ${{ inputs.dry_run == true && 'Dry Run - Crates' || 'Publish Crates' }}
    runs-on: ubuntu-22.04
    environment: crate
    permissions:
      contents: read
      # For crates.io Trusted Publishing.
      id-token: write
    steps:
      - name: Show dry-run status
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "RUNNING IN DRY-RUN MODE - No crates will be published to crates.io"
            echo "=================================================================="
          else
            echo "LIVE MODE - Crates will be published to crates.io"
            echo "================================================="
          fi

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
          ref: ${{ github.event.inputs.branch }}
          submodules: true

      - name: Setup Go
        uses: ./.github/actions/setup-go
        with:
          go-version: 1.26.0
          cache-name: release-crates

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: release-crates

      - name: Test tsgo-client
        run: cargo test -p tsgo-client --verbose

      - name: Package tsgo-client
        if: ${{ inputs.dry_run == true }}
        run: cargo publish --manifest-path crates/tsgo-client/Cargo.toml --locked --dry-run

      - name: Authenticate with crates.io
        if: ${{ inputs.dry_run == false }}
        id: auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4

      - name: Publish tsgo-client
        if: ${{ inputs.dry_run == false }}
        run: cargo publish --manifest-path crates/tsgo-client/Cargo.toml --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
