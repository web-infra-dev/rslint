name: Setup Go
description: Setup Go

inputs:
  go-version:
    description: Go version range to set up.
    required: true
  cache-name:
    description: >
      Name of scoped cache for this set up. On self-hosted Windows runners it
      also derives the GOCACHE / TEMP subdirectory path under the runner work
      disk, so it must not contain path separators (`\` or `/`).
    default: 'cache'

runs:
  using: composite
  steps:
    - name: Install Go
      id: install-go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
      with:
        go-version: ${{ inputs.go-version }}
        cache: false

    - name: Go cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      if: runner.environment == 'github-hosted'
      with:
        key: setup-go-${{ runner.os }}-${{ steps.install-go.outputs.go-version }}-${{ inputs.cache-name }}-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          setup-go-${{ runner.os }}-${{ steps.install-go.outputs.go-version }}-${{ inputs.cache-name }}-${{ hashFiles('**/go.sum') }}
        # Only cache module downloads, not build cache (GOCACHE is too large
        # and fills up disk on self-hosted runners)
        path: |
          ~/go/pkg/mod

    - name: Go cache
      uses: lynx-infra/cache@5c6160a6a4c7fca80a2f3057bb9dfc9513fcb732
      if: runner.environment == 'self-hosted'
      with:
        key: setup-go-SH-2-${{ runner.os }}-${{ steps.install-go.outputs.go-version }}-${{ inputs.cache-name }}-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          setup-go-SH-2-${{ runner.os }}-${{ steps.install-go.outputs.go-version }}-${{ inputs.cache-name }}-${{ hashFiles('**/go.sum') }}
        # Only cache module downloads, not build cache (GOCACHE is too large
        # and fills up disk on self-hosted runners)
        path: |
          ~/go/pkg/mod

    # Clean GOCACHE on self-hosted runners to prevent disk space issues.
    # Build cache is not persisted via cache action, so it grows indefinitely
    # on persistent runners and must be cleaned each run.
    - name: Clean Go build cache
      shell: bash
      if: runner.environment == 'self-hosted'
      run: go clean -cache

    # Clean up after cache restore - remove toolchain to save space
    - name: Clean Go module cache dir (Linux)
      shell: bash
      if: runner.os == 'Linux'
      run: sudo rm -rf ~/go/pkg/mod/golang.org/toolchain*

    - name: Clean Go module cache dir (Windows)
      shell: pwsh
      if: runner.os == 'Windows'
      run: |
        $toolchainPath = Join-Path $env:USERPROFILE "go/pkg/mod/golang.org"
        if (Test-Path $toolchainPath) {
          Get-ChildItem -Path $toolchainPath -Filter "toolchain*" -Directory | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
        }

    # Relocate GOCACHE / TEMP / GOTMPDIR off the small system drive on
    # self-hosted Windows runners. Required when compiling Go projects whose
    # build cache and $WORK temp directory would exceed the system drive's
    # free space (e.g. anything that pulls in the typescript-go shim). Paths
    # are derived from `cache-name` to keep concurrent jobs on the same runner
    # isolated.
    - name: Relocate Go cache & temp (self-hosted Windows)
      if: runner.environment == 'self-hosted' && runner.os == 'Windows'
      shell: pwsh
      run: |
        $base = 'C:\Users\ContainerAdministrator\runner\_work'
        $goCache = Join-Path $base "go\${{ inputs.cache-name }}"
        $temp    = Join-Path $base "temp\${{ inputs.cache-name }}"
        New-Item -ItemType Directory -Force -Path $goCache, $temp | Out-Null

        "GOCACHE=$goCache" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
        "TEMP=$temp"       | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
        "TMP=$temp"        | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
        "GOTMPDIR=$temp"   | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
