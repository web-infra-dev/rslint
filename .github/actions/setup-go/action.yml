name: Setup Go
description: Setup Go

inputs:
  go-version:
    description: Go version range to set up.
    required: true
  cache-name:
    description: Name of scoped cache for this set up.
    default: 'cache'

runs:
  using: composite
  steps:
    - name: Install Go
      id: install-go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
      with:
        go-version: ${{ inputs.go-version }}
        cache: false

    - name: Go cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      if: runner.environment == 'github-hosted'
      with:
        key: setup-go-${{ runner.os }}-${{ steps.install-go.outputs.go-version }}-${{ inputs.cache-name }}-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          setup-go-${{ runner.os }}-${{ steps.install-go.outputs.go-version }}-${{ inputs.cache-name }}-${{ hashFiles('**/go.sum') }}
        # Only cache module downloads, not build cache (too large for disk limits)
        path: |
          ~/go/pkg/mod

    - name: Go cache
      uses: lynx-infra/cache@5c6160a6a4c7fca80a2f3057bb9dfc9513fcb732
      if: runner.environment == 'self-hosted'
      with:
        key: setup-go-SH-2-${{ runner.os }}-${{ steps.install-go.outputs.go-version }}-${{ inputs.cache-name }}-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          setup-go-SH-2-${{ runner.os }}-${{ steps.install-go.outputs.go-version }}-${{ inputs.cache-name }}-${{ hashFiles('**/go.sum') }}
        # Only cache module downloads, not build cache (too large for disk limits)
        path: |
          ~/go/pkg/mod

    # Clean up after cache restore to save disk space
    - name: Clean Go build cache (Windows)
      shell: pwsh
      if: runner.os == 'Windows'
      run: |
        $gocache = go env GOCACHE
        if (Test-Path $gocache) {
          Write-Host "Cleaning GOCACHE at $gocache"
          Remove-Item -Path $gocache -Recurse -Force -ErrorAction SilentlyContinue
        }

    - name: Clean Go module cache dir (Linux)
      shell: bash
      if: runner.os == 'Linux'
      run: sudo rm -rf ~/go/pkg/mod/golang.org/toolchain*

    - name: Clean Go module cache dir (Windows)
      shell: pwsh
      if: runner.os == 'Windows'
      run: |
        $toolchainPath = Join-Path $env:USERPROFILE "go/pkg/mod/golang.org"
        if (Test-Path $toolchainPath) {
          Get-ChildItem -Path $toolchainPath -Filter "toolchain*" -Directory | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
        }
